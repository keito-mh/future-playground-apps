<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>ぷるぷるゼリー</title>
    <meta
      name="description"
      content="ゼリーをタップ・ドラッグ・長押し・シェイクでぷるぷる揺らして、自分だけのゼリーを完成させる、触って気持ちいいミニ体験。"
    />
    <meta name="theme-color" content="#eaf6ff" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="wrap">
      <canvas id="stage"></canvas>

      <!-- 初回の説明（最初のタッチで消える） -->
      <div id="intro">
        <div class="introInner">
          <div class="introBlob"></div>
          <p class="introText">さわって、ゼリーを育てよう</p>
          <p class="introSub">ぷにっ・ぐにーっ・ぷるん</p>
        </div>
      </div>

      <!-- ぷるぷるメーター（上部・控えめ） -->
      <div id="meterWrap" aria-hidden="true">
        <div id="meter"><i></i></div>
      </div>

      <!-- 音のオン/オフ（左上・控えめ。初期ミュート） -->
      <button id="sound" aria-label="音のオン・オフ" title="音" aria-pressed="false">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <path
            d="M4 9.5h3.5L12 5.5v13L7.5 14.5H4z"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linejoin="round"
          />
          <path
            class="wave"
            d="M15.5 9.2a4 4 0 0 1 0 5.6M17.8 7a7 7 0 0 1 0 10"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
          />
          <path
            class="slash"
            d="M16 8.5l4 7"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
          />
        </svg>
      </button>

      <!-- 邪魔にならない位置のリセット -->
      <button id="reset" aria-label="さいしょから" title="さいしょから">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <path
            d="M19 12a7 7 0 1 1-2.05-4.95M19 4.5V8.5h-4"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>

      <!-- 画面下部のボタン -->
      <div id="controls">
        <button id="jiggle" class="ctrlBtn">ぷるぷる</button>
        <button id="finish" class="ctrlBtn primary" hidden>完成する</button>
      </div>

      <!-- 完成画面 -->
      <div id="result" hidden aria-live="polite">
        <div class="resultInner">
          <p class="resultLabel">きみのゼリー</p>
          <h2 class="resultName"></h2>
          <p class="resultDesc"></p>
          <div class="resultBtns">
            <button id="again" class="ctrlBtn">またぷるぷるする</button>
            <button id="remake" class="ctrlBtn primary">もう一度つくる</button>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
