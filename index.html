<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Future Playground</title>
    <meta name="description" content="遊べるミニ体験コレクション。タップひとつで、ちょっと未来な遊び。" />
    <style>
      *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
      body{min-height:100vh;background:#05050b;color:#fff;
        font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP",sans-serif;
        padding:calc(40px + env(safe-area-inset-top)) 20px 60px;display:flex;flex-direction:column;align-items:center;}
      .wrap{width:100%;max-width:560px;}
      h1{font-size:clamp(28px,8vw,40px);font-weight:600;letter-spacing:1px;
        background:linear-gradient(90deg,#ff5a7a,#ffd23d,#33dd88,#3399ff,#aa5cff);
        -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
      .lead{margin-top:10px;color:rgba(255,255,255,0.6);font-size:clamp(13px,3.6vw,15px);line-height:1.7;}
      .grid{margin-top:32px;display:grid;gap:14px;}
      a.card{display:block;text-decoration:none;color:#fff;border:0.5px solid rgba(255,255,255,0.18);
        border-radius:16px;padding:20px;background:rgba(255,255,255,0.04);transition:transform .15s,border-color .15s,background .15s;}
      a.card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.07);}
      a.card:active{transform:scale(0.99);}
      .swatches{display:flex;gap:6px;margin-bottom:12px;}
      .swatches i{width:18px;height:18px;border-radius:50%;display:block;box-shadow:0 0 10px currentColor;}
      .title{font-size:clamp(18px,5vw,22px);font-weight:600;}
      .desc{margin-top:6px;color:rgba(255,255,255,0.6);font-size:clamp(12px,3.4vw,14px);line-height:1.6;}
      .play{margin-top:14px;display:inline-block;font-size:14px;font-weight:600;
        border:0.5px solid rgba(255,255,255,0.35);border-radius:999px;padding:8px 18px;}
      footer{margin-top:40px;color:rgba(255,255,255,0.3);font-size:12px;text-align:center;}
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Future Playground</h1>
      <p class="lead">タップひとつで、ちょっと未来な遊び。<br />スキマ時間に遊べるミニ体験のコレクション。</p>

      <div class="grid">
        <a class="card" href="./color-mission/">
          <div class="swatches">
            <i style="background:hsl(0,90%,60%);color:hsl(0,90%,60%)"></i>
            <i style="background:hsl(52,90%,60%);color:hsl(52,90%,60%)"></i>
            <i style="background:hsl(140,90%,60%);color:hsl(140,90%,60%)"></i>
            <i style="background:hsl(220,90%,60%);color:hsl(220,90%,60%)"></i>
            <i style="background:hsl(300,90%,60%);color:hsl(300,90%,60%)"></i>
          </div>
          <div class="title">カラーミッション</div>
          <div class="desc">流れてくる色玉を、指でぐるっと囲って消す。お題の色だけ狙え。レベルアップで囲い放題のボーナスタイム！</div>
          <span class="play">▶ あそぶ</span>
        </a>
      </div>

      <footer>© Future Playground</footer>
    </div>
  </body>
</html>
