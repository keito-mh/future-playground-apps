<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <!--
      セキュリティ堅牢化：このアプリは完全に自己完結（外部通信なし）。
      自分のファイル以外の読み込み・スクリプト注入・外部送信をすべて禁止する。
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; media-src 'self'; connect-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <meta name="referrer" content="no-referrer" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>みずなぞり</title>
    <meta
      name="description"
      content="指で画面をなぞると、水面が軌跡に沿ってスッとひらく。波紋・水しぶき・光の粒が広がる、触って気持ちいい水面体験。"
    />
    <meta name="theme-color" content="#06141f" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2024%2024'%3E%3Cpath%20d='M12%203C8%207.5%206%2010.5%206%2013.2a6%206%200%200%200%2012%200C18%2010.5%2016%207.5%2012%203z'%20fill='%2364c8e8'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="wrap">
      <canvas id="water"></canvas>

      <!-- 初回の説明（最初のタッチで消える） -->
      <div id="intro">
        <div class="introInner">
          <div class="drop"></div>
          <p class="introText">なぞって、光をともそう</p>
        </div>
      </div>

      <!-- チュートリアルのヒント（操作に合わせて出る） -->
      <div id="hint" aria-live="polite"><p></p></div>

      <!-- 音のオン/オフ（左上・控えめ） -->
      <button id="sound" aria-label="音のオン・オフ" title="音" aria-pressed="true">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <path
            d="M4 9.5h3.5L12 5.5v13L7.5 14.5H4z"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linejoin="round"
          />
          <path
            class="wave"
            d="M15.5 9.2a4 4 0 0 1 0 5.6M17.8 7a7 7 0 0 1 0 10"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
          />
          <path
            class="slash"
            d="M16 8.5l4 7"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
          />
        </svg>
      </button>

      <!-- 邪魔にならない位置のリセット -->
      <button id="reset" aria-label="水面をしずめる" title="しずめる">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <path
            d="M12 3.2c-3.6 4-6 7-6 9.8a6 6 0 0 0 12 0c0-2.8-2.4-5.8-6-9.8z"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linejoin="round"
          />
        </svg>
      </button>

      <!-- 画面下部のモード切替 -->
      <div id="modes" role="tablist" aria-label="水の質感">
        <button class="mode is-active" data-mode="clear">クリア</button>
        <button class="mode" data-mode="flow">フロー</button>
        <button class="mode" data-mode="jelly">ジェリー</button>
        <button class="mode" data-mode="sparkle">きらめき</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
