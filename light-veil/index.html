<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>ひかりなぞり</title>
    <meta
      name="description"
      content="カメラ映像や写真の上を指でなぞると、光の粒・泡・半透明の膜がふわっと広がる体験。緑〜シアンの発光がきれいに咲く、触って気持ちいいミニアプリ。"
    />
    <meta name="theme-color" content="#04100c" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="wrap">
      <!-- 背景（カメラ／写真）と、その上のエフェクトをまとめて描く1枚のキャンバス -->
      <canvas id="stage"></canvas>

      <!-- 背景用の隠しメディア（キャンバスへ転写するだけ・表示はしない） -->
      <video id="cam" playsinline autoplay muted></video>

      <!-- ファイル選択（写真モード） -->
      <input id="file" type="file" accept="image/*" hidden />

      <!-- 初回の一言ガイド（最初の操作で消える） -->
      <div id="intro">
        <div class="introInner">
          <div class="orb"></div>
          <p class="introText">手をかざすと、光があふれる</p>
          <p class="introSub">ひらく・つまむ・にぎる で あやつる</p>
        </div>
      </div>

      <!-- カメラ許可前 / 失敗時の案内 -->
      <div id="gate" class="hidden">
        <div class="gateCard">
          <p class="gateTitle">どこに光を描く？</p>
          <p class="gateText">カメラ映像か、手持ちの写真の上に描けます。</p>
          <div class="gateBtns">
            <button id="gateCam" class="gateBtn primary">カメラを使う</button>
            <button id="gatePhoto" class="gateBtn">写真を選ぶ</button>
          </div>
          <p id="gateNote" class="gateNote"></p>
        </div>
      </div>

      <!-- 撮影フラッシュ -->
      <div id="flash"></div>

      <!-- カメラシャッター（画面下中央） -->
      <button id="shutter" aria-label="撮影"><span></span></button>

      <!-- トースト（保存・切替などの一時表示） -->
      <div id="toast" aria-live="polite"></div>

      <!-- 左上：音のオン/オフ -->
      <button id="sound" class="iconBtn" aria-label="音のオン・オフ" title="おと" aria-pressed="true">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <path d="M4 9.5h3.5L12 5.5v13L7.5 14.5H4z" fill="none" stroke="currentColor"
            stroke-width="1.6" stroke-linejoin="round" />
          <path class="wave" d="M15.5 9.2a4 4 0 0 1 0 5.6M17.8 7a7 7 0 0 1 0 10"
            fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
          <path class="slash" d="M15.5 8l5 8" fill="none" stroke="currentColor"
            stroke-width="1.6" stroke-linecap="round" />
        </svg>
      </button>

      <!-- 右上ユーティリティ -->
      <div id="util">
        <button id="flip" class="iconBtn" aria-label="内カメラ・外カメラ切替" title="カメラ切替">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <rect x="3" y="7" width="18" height="13" rx="3" fill="none" stroke="currentColor" stroke-width="1.6" />
            <path d="M9 7l1.3-2h3.4L15 7" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
            <path d="M9.5 13.5a2.8 2.8 0 0 1 5-1.2M14.5 13.5a2.8 2.8 0 0 1-5 1.2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
            <path d="M14.6 11.1l.1 1.3-1.3-.2M9.4 15.9l-.1-1.3 1.3.2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
        <button id="hand" class="iconBtn on" aria-label="手の認識オン・オフ" title="手で あやつる" aria-pressed="true">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M8 11V6.2a1.3 1.3 0 0 1 2.6 0V10m0-.2V5.2a1.3 1.3 0 0 1 2.6 0V10m0-.6V6a1.3 1.3 0 0 1 2.6 0v5m0-2.2a1.3 1.3 0 0 1 2.6 0v4.8c0 3-2.2 5.4-5.4 5.4h-1.2c-1.7 0-2.8-.6-3.9-1.9L5 16.5c-.7-.9-.5-1.8.3-2.3.7-.4 1.5-.2 2 .4L8 15.4z"
              fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
          </svg>
        </button>
        <button id="draw" class="iconBtn" aria-label="お絵描きモード オン・オフ" title="お絵描き" aria-pressed="false">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M4 20l1-4L15.5 5.5a2 2 0 0 1 2.8 0l0.2.2a2 2 0 0 1 0 2.8L8 19l-4 1z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
            <path d="M14 7l3 3" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          </svg>
        </button>
        <button id="reset" class="iconBtn" aria-label="エフェクトを消す" title="けす">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M12 3.2c-3.6 4-6 7-6 9.8a6 6 0 0 0 12 0c0-2.8-2.4-5.8-6-9.8z"
              fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
          </svg>
        </button>
        <button id="save" class="iconBtn" aria-label="画像を保存" title="ほぞん">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M12 4v10m0 0l-4-4m4 4l4-4M5 19h14"
              fill="none" stroke="currentColor" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
      </div>

      <!-- 画面下部のコントロール -->
      <div id="dock">
        <!-- ソース切替（カメラ / 写真） -->
        <div id="source" role="tablist" aria-label="背景の切替">
          <button class="src is-active" data-src="camera">カメラ</button>
          <button class="src" data-src="photo">写真</button>
        </div>

        <!-- 光の色テーマ -->
        <div id="modes" role="tablist" aria-label="光の色">
          <button class="mode is-active" data-mode="green">みどり</button>
          <button class="mode" data-mode="aurora">オーロラ</button>
          <button class="mode" data-mode="gold">ゴールド</button>
        </div>
      </div>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
